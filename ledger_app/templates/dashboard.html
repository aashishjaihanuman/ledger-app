<!DOCTYPE html>
<html>
<head>
<title>Ledger Pro</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.logo {
  text-align:center;
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
  color:#00f2fe;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

input, button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
}

input {
  background:#111;
  color:white;
}

button {
  background:#00f2fe;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  opacity:0.8;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  text-align:center;
}

tr:nth-child(even) {
  background:rgba(255,255,255,0.05);
}

.negative { color:red; font-weight:bold; }
.positive { color:#00ff99; }

</style>
</head>

<body>

<div class="container">

<div class="logo">⚡ LEDGER PRO</div>

<h3 style="text-align:center;">Welcome {{session.username}}</h3>

<div class="card">
<form method="POST">
<input type="date" name="date" required><br>
<input name="desc" placeholder="Description">
<input name="amount" type="number" step="0.01">
<button>Add Entry</button>
</form>
</div>

<div class="card">

<table>
<tr>
<th>Date</th>
<th>Description</th>
<th>Amount</th>
<th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td class="{{ 'negative' if row[4] < 0 else 'positive' }}">
{{row[4]}}
</td>
<td><a href="/delete/{{row[0]}}" style="color:#ff4d4d;">Delete</a></td>
</tr>
{% endfor %}

</table>

<h3>Total: {{total}}</h3>

<br>
<a href="/pdf"><button>Download PDF</button></a>
<a href="/logout"><button>Logout</button></a>

</div>

</div>

</body>
</html>
